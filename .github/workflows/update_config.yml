name: Daily KaringX Ruleset Sync

on:
  schedule:
    # اجرا در ساعت 00:30 بامداد به وقت UTC (برابر با ساعت 04:00 بامداد به وقت ایران)
    - cron: '30 0 * * *'
  workflow_dispatch: # فعال بودن امکان اجرای دستی از داخل پنل گیت‌هاب

jobs:
  update-rules:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/tools/python@v5
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Ruleset Extractor
      run: python update_config.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # بررسی اینکه آیا فایل واقعا تغییر کرده است یا نه
        if git status --porcelain | grep -q "shadowrocket_iran.conf"; then
          git add shadowrocket_iran.conf
          git commit -m "Auto-update: Synced Shadowrocket rules with KaringX at $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          git push origin main
        else
          echo "No changes detected in the ruleset. Skipping push."
        fi
